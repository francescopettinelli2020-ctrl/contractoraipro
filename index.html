<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ContractorAIPro™</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#0A0A0C;--panel:#141418;--panel2:#1B1B20;--line:#26262C;--ink:#F4F3EF;--muted:#8A8A93;--gold:#2E7DFF;--gold2:#5C9CFF;--soft:#2E7DFF1A;--ok:#43B581;--warn:#E0A93B;--red:#E0685F}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh;overflow-x:hidden}
.sg{font-family:'Space Grotesk',sans-serif}.gold{color:var(--gold)}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:#2c2c33;border-radius:8px}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* SIDEBAR */
.side{width:236px;background:#08080A;border-right:1px solid var(--line);flex-shrink:0;height:100vh;position:fixed;left:0;top:0;transform:translateX(-100%);transition:.25s;display:flex;flex-direction:column;z-index:50}
.side.open{transform:none}
.brand{padding:24px 22px 18px;font-size:18px;font-weight:700;letter-spacing:-.01em}
.logomark{width:26px;height:26px;border-radius:8px;background:radial-gradient(circle at 32% 28%,#CFE2FF,#2E7DFF 55%,#143A78);box-shadow:0 0 16px rgba(46,125,255,.45);flex-shrink:0;display:inline-block}
.topbrand{display:flex;font-size:15px;font-weight:700;letter-spacing:-.01em;align-items:center;gap:8px;cursor:pointer}
.brand sup{font-size:8px;color:var(--muted)}
.nav{flex:1;padding:6px 12px}
.nv{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:13px;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:3px;transition:.15s}
.nv .ic{font-size:17px;width:20px;text-align:center}
.nv:hover{background:var(--panel);color:var(--ink)}
.nv.sel{background:var(--soft);color:var(--gold);font-weight:600}
.sfoot{padding:12px}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;max-width:720px;margin:0 auto;width:100%}
.top{height:64px;display:flex;align-items:center;gap:14px;padding:0 26px;position:sticky;top:0;background:rgba(10,10,12,.7);backdrop-filter:blur(12px);z-index:30}
.burger{display:block;font-size:21px;background:none;border:none;color:var(--ink)}
.top .date{color:var(--muted);font-size:13px;font-weight:500;margin-left:auto}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#1E5FE0);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.wrap{padding:8px 26px 120px;max-width:1180px;width:100%;margin:0 auto;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.h1{font-size:30px;font-weight:700;letter-spacing:-.02em}
.ph{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px}
.sub{color:var(--muted);font-size:14px;margin:4px 0 22px;line-height:1.5;max-width:620px}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;transition:.2s}
.grid{display:grid;gap:16px}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}
.ct{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.ct .r{color:var(--gold);cursor:pointer;letter-spacing:0;text-transform:none;font-size:12px}
.big{font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1}
.li{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #1f1f25}
.li:last-child{border:none}.li .n{font-size:14px;font-weight:600}.li .s{font-size:12.5px;color:var(--muted);margin-top:2px}
.pill{font-size:11px;font-weight:600;padding:4px 11px;border-radius:99px;white-space:nowrap}
.bar{height:7px;background:#26262c;border-radius:99px;overflow:hidden;margin-top:9px}.bar>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.btn{background:var(--gold);color:#FFFFFF;border:none;border-radius:12px;padding:12px 18px;font-weight:700;font-size:13.5px}
.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-weight:600;font-size:13.5px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:var(--panel2);border-radius:15px;padding:15px}
.stat .l{font-size:12px;color:var(--muted)}.stat .v{font-size:22px;font-weight:600;margin-top:6px}
.tool{cursor:pointer;display:flex;flex-direction:column;gap:8px}.tool:hover{border-color:var(--gold);transform:translateY(-2px)}
.tool .e{font-size:26px}.tool .t{font-size:16px;font-weight:600}.tool .d{font-size:12.5px;color:var(--muted)}
.chip{display:inline-block;font-size:12px;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:7px 13px;margin:0 6px 8px 0;cursor:pointer}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.thumb{width:100%;height:120px;border-radius:13px;object-fit:cover;background:linear-gradient(135deg,#2E7DFF30,#2E7DFF0a)}
.stars{color:var(--gold);font-size:13px;letter-spacing:1px}

/* ORB */
.orb{border-radius:50%;position:relative;flex-shrink:0;background:radial-gradient(circle at 36% 30%,#CFE2FF,#5C9CFF 34%,#2E7DFF 62%,#143A78 100%);box-shadow:0 0 50px 6px rgba(46,125,255,.4),inset 0 0 40px rgba(210,228,255,.55);animation:breathe 4.2s ease-in-out infinite}
.orb::before{content:'';position:absolute;inset:-7px;border-radius:50%;background:conic-gradient(from 0deg,#2E7DFF,#CFE2FF,#2E7DFF,#143A78,#2E7DFF);filter:blur(15px);opacity:.5;z-index:-1;animation:spin 9s linear infinite}
.orb.sp{animation:breathe 1.6s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}
@keyframes spin{to{transform:rotate(360deg)}}
.wave{display:flex;gap:5px;align-items:center;height:34px;justify-content:center}
.wave i{width:5px;height:10px;background:var(--gold);border-radius:3px;animation:wv 1s ease-in-out infinite}
.wave i:nth-child(2){animation-delay:.15s}.wave i:nth-child(3){animation-delay:.3s}.wave i:nth-child(4){animation-delay:.45s}.wave i:nth-child(5){animation-delay:.6s}.wave i:nth-child(6){animation-delay:.2s}.wave i:nth-child(7){animation-delay:.4s}
@keyframes wv{0%,100%{height:8px;opacity:.5}50%{height:30px;opacity:1}}

/* TANYA DOCK + OVERLAY */
.dock{position:fixed;right:22px;bottom:22px;width:60px;height:60px;z-index:60;cursor:pointer}
.dock .orb{width:60px;height:60px}
.dock .lbl{position:absolute;right:70px;top:50%;transform:translateY(-50%);background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:8px 14px;font-size:12.5px;font-weight:600;white-space:nowrap;opacity:0;transition:.2s;pointer-events:none}
.dock:hover .lbl{opacity:1}
.tanya{position:fixed;inset:0;z-index:100;background:radial-gradient(circle at 50% 30%,#0B1322,#080809 70%);display:none;flex-direction:column;align-items:center;padding:30px 20px;overflow-y:auto}
.tanya.on{display:flex;animation:fade .35s ease}
.tanya .x{position:absolute;top:20px;right:24px;font-size:26px;color:var(--muted);background:none;border:none}
.tanya .hello{font-size:15px;color:var(--muted);margin-top:8px}
.tanya .orb{width:190px;height:190px;margin:38px 0 18px}
.tname{font-size:26px;font-weight:700}
.feed{width:100%;max-width:560px;margin:14px 0;display:flex;flex-direction:column;gap:12px}
.bub{border-radius:16px;padding:13px 16px;font-size:14px;line-height:1.55;max-width:88%}
.bub.t{background:var(--panel);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px;white-space:pre-wrap}
.bub.u{background:var(--gold);color:#FFFFFF;align-self:flex-end;border-bottom-right-radius:5px;font-weight:600}
.tbar{position:sticky;bottom:0;width:100%;max-width:560px;display:flex;gap:9px;padding-top:10px}
.tbar input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;color:var(--ink);font-size:14px;outline:none}
.tchips{max-width:560px;text-align:center}

.sheet{position:fixed;inset:0;z-index:80;display:none}
.sheet.on{display:block}
.sheetbg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.sheetcard{position:absolute;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;background:var(--panel);border-radius:24px 24px 0 0;border-top:1px solid var(--line);padding:24px 22px 30px;max-width:680px;margin:0 auto;animation:up .3s ease}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.litem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #1f1f25}
.litem:last-child{border:none}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:45}
@media(min-width:861px){
 .side{position:sticky;transform:none;height:100vh;top:0;align-self:flex-start;z-index:5}
 .burger{display:none}.topbrand{display:none}.scrim{display:none!important}
 .main{max-width:none;margin:0}.wrap{max-width:1280px;padding-top:18px}
}
@media(max-width:860px){
 .side{position:fixed;left:0;top:0;transform:translateX(-100%);transition:.25s}.side.open{transform:none}
 .burger{display:block}.topbrand{display:flex}.g2,.g3,.row3{grid-template-columns:1fr}.scrim.show{display:block}
 .wrap{padding:8px 16px 120px}.h1{font-size:25px}
}
</style>

var rec=null,listening=false,convo=false;

var VOICE_PREF=null;
function pickVoice(){var vs=(window.speechSynthesis&&speechSynthesis.getVoices())||[];if(!vs.length)return null;var order=[/aria.*natural/i,/jenny.*natural/i,/emma.*natural/i,/ava.*natural/i,/michelle.*natural/i,/natural/i,/samantha/i,/ava/i,/allison/i,/google us english/i,/jenny/i,/aria/i,/zira/i,/female/i];for(var i=0;i<order.length;i++){var en=vs.filter(function(v){return order[i].test(v.name)&&/^en/i.test(v.lang);});if(en.length)return en[0];var any=vs.filter(function(v){return order[i].test(v.name);});if(any.length)return any[0];}return vs.filter(function(v){return /^en/i.test(v.lang);})[0]||vs[0];}
if('speechSynthesis' in window){try{speechSynthesis.onvoiceschanged=function(){VOICE_PREF=pickVoice();};}catch(e){}setTimeout(function(){VOICE_PREF=pickVoice();},300);}
function speak(t){if(!('speechSynthesis' in window)||!t){orbState('idle');return;}try{speechSynthesis.cancel();var clean=String(t).replace(/[#*_`>]/g,'').replace(/\s+/g,' ').trim();var u=new SpeechSynthesisUtterance(clean);if(!VOICE_PREF)VOICE_PREF=pickVoice();if(VOICE_PREF)u.voice=VOICE_PREF;u.rate=.97;u.pitch=1.02;u.volume=1;orbState('speak');u.onend=function(){if(convo){setTimeout(function(){if(convo&&!listening)listen();},350);}else orbState('idle');};speechSynthesis.speak(u);}catch(e){orbState('idle');}}
function listen(){if(!VOICE){toast('Voice input works in Chrome or Safari');if($('tin'))$('tin').focus();return;}if(listening)return;try{if('speechSynthesis' in window)speechSynthesis.cancel();}catch(e){}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;listening=true;orbState('listen');rec.onresult=function(e){listening=false;tanyaAsk(e.results[0][0].transcript,true);};rec.onerror=function(ev){listening=false;if(ev&&(ev.error==='not-allowed'||ev.error==='service-not-allowed')){convo=false;orbState('idle');return;}if(convo){setTimeout(function(){if(convo&&!listening)listen();},800);}else orbState('idle');};rec.onend=function(){if(listening){listening=false;if(convo){setTimeout(function(){if(convo&&!listening)listen();},450);}else orbState('idle');}};try{rec.start();}catch(e){listening=false;if(!convo)orbState('idle');}}
function orbTap(){if(convo){convo=false;try{rec&&rec.stop();}catch(e){}try{if('speechSynthesis' in window)speechSynthesis.cancel();}catch(e){}listening=false;orbState('idle');return;}convo=true;listen();}

var MS_KB=`
MILTON STONE KNOWLEDGE BASE (source of truth):
